<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Security Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px; min-width: 260px; background: #181825; border-right: 1px solid #313244;
    display: flex; flex-direction: column; overflow-y: auto; padding: 16px;
    transition: margin-left 0.2s; z-index: 20;
  }
  #sidebar.collapsed { margin-left: -260px; }
  #sidebar h2 { font-size: 14px; font-weight: 600; color: #bac2de; margin: 14px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  #sidebar h2:first-child { margin-top: 0; }
  .filter-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .filter-row label { font-size: 13px; cursor: pointer; flex: 1; }
  .filter-row .count { font-size: 11px; color: #6c7086; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  #sidebar select {
    width: 100%; padding: 6px 8px; border-radius: 6px; font-size: 13px;
    background: #313244; color: #cdd6f4; border: 1px solid #45475a;
    cursor: pointer; outline: none;
  }
  #sidebar select:hover { border-color: #6c7086; }

  /* ── Toggle button ── */
  #toggle-btn {
    position: fixed; top: 12px; left: 12px; z-index: 30;
    background: #313244; border: 1px solid #45475a; color: #cdd6f4;
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: left 0.2s;
  }
  #toggle-btn.shifted { left: 272px; }

  /* ── Graph container ── */
  #sigma-container { flex: 1; position: relative; }

  /* ── Tooltip ── */
  #tooltip {
    display: none; position: fixed; z-index: 40;
    background: #1e1e2e; border: 1px solid #45475a; border-radius: 8px;
    padding: 0; max-width: 500px; min-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: none;
    font-size: 12px;
  }
  #tooltip .tt-header {
    padding: 8px 12px; border-bottom: 1px solid #313244;
    display: flex; align-items: center; gap: 8px;
  }
  #tooltip .tt-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; color: #1e1e2e;
  }
  #tooltip .tt-urn { font-size: 11px; color: #6c7086; word-break: break-all; padding: 4px 12px 6px; }
  #tooltip table { width: 100%; border-collapse: collapse; }
  #tooltip td { padding: 4px 12px; border-top: 1px solid #313244; }
  #tooltip td:first-child { color: #6c7086; white-space: nowrap; width: 1%; }
  #tooltip td:last-child { color: #cdd6f4; word-break: break-word; }

  /* ── Stats bar ── */
  #stats {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: #181825; border-top: 1px solid #313244;
    padding: 6px 16px; font-size: 12px; color: #6c7086;
    display: flex; gap: 20px;
  }
</style>
</head>
<body>

<button id="toggle-btn" class="shifted">Filters</button>
<div id="sidebar">
  <h2>Node Types</h2>
  <div id="node-filters"></div>
  <h2>Edge Types</h2>
  <div id="edge-filters"></div>
  <h2>Layout</h2>
  <div class="filter-row">
    <select id="layout-select">
      <option value="forceatlas2" selected>ForceAtlas2</option>
      <option value="circular">Circular</option>
      <option value="random">Random</option>
    </select>
  </div>
  <h2>Options</h2>
  <div class="filter-row">
    <input type="checkbox" id="hide-structural" checked />
    <label for="hide-structural">Hide structural CONTAINS</label>
  </div>
</div>
<div id="sigma-container"></div>
<div id="tooltip"></div>
<div id="stats"></div>

<script type="module">
import Graph from "https://esm.sh/graphology@0.25.4";
import circular from "https://esm.sh/graphology-layout@0.6.1/circular";
import random from "https://esm.sh/graphology-layout@0.6.1/random";
import forceAtlas2 from "https://esm.sh/graphology-layout-forceatlas2@0.10.1";
import Sigma from "https://esm.sh/sigma@3.0.2";

// ── Style maps ──
const NODE_STYLES = {
  database:  { color: "#6366f1", size: 18 },
  schema:    { color: "#8b5cf6", size: 14 },
  table:     { color: "#0ea5e9", size: 10 },
  column:    { color: "#94a3b8", size: 4  },
  codebase:  { color: "#22c55e", size: 16 },
  file:      { color: "#10b981", size: 7  },
  class:     { color: "#84cc16", size: 10 },
  function:  { color: "#14b8a6", size: 6  },
  s3_bucket:    { color: "#f59e0b", size: 16 },
  s3_prefix:    { color: "#fb923c", size: 12 },
  s3_partition: { color: "#fbbf24", size: 9  },
  s3_object:    { color: "#fde68a", size: 7  },
  unknown:   { color: "#64748b", size: 5  },
};

const EDGE_STYLES = {
  CONTAINS:     { color: "#45475a", size: 0.5 },
  DATA_TO_DATA: { color: "#f43f5e", size: 1.5 },
  CODE_TO_DATA: { color: "#f97316", size: 2   },
  CODE_TO_CODE: { color: "#a78bfa", size: 1.5 },
};

const STRUCTURAL_SOURCES = new Set(["database", "schema", "codebase", "file"]);

// ── State ──
let sigmaInstance = null;
let graphInstance = null;
let allNodes = [];
let allEdges = [];
let nodeTypeIndex = {};
let hiddenNodes = new Set();
let hiddenEdgeTypes = new Set();
let hideStructural = true;
let hoveredNode = null;
let hoveredNeighbors = new Set();
let currentLayout = "forceatlas2";

// ── URN label: last N segments ──
function urnLabel(urn) {
  const path = urn.split(":").pop() || urn;
  const parts = path.split("/");
  if (parts.length <= 3) return parts.join("/");
  return parts.slice(-3).join("/");
}

// ── Load and render ──
async function main() {
  const resp = await fetch("graph_data.json");
  const data = await resp.json();
  allNodes = data.nodes;
  allEdges = data.edges;

  // Merge soft links as additional edges
  try {
    const slResp = await fetch("soft_links.json");
    if (slResp.ok) {
      const slData = await slResp.json();
      const nodeUrns = new Set(allNodes.map(n => n.urn));
      for (const link of (slData.soft_links || [])) {
        if (!nodeUrns.has(link.from_urn) || !nodeUrns.has(link.to_urn)) continue;
        allEdges.push({
          uuid: link.id,
          from_urn: link.from_urn,
          to_urn: link.to_urn,
          relation_type: link.relation_type || "CODE_TO_DATA",
          metadata: {
            detection_method: link.detection_method || "soft_link",
            confidence: link.confidence,
            note: link.note,
          },
        });
      }
    }
  } catch (_) { /* soft_links.json missing or invalid — continue without */ }

  buildGraph();
  buildFilters();
  updateStats();
  setupTooltip();

  document.getElementById("toggle-btn").addEventListener("click", toggleSidebar);
  document.getElementById("hide-structural").addEventListener("change", onStructuralToggle);
  document.getElementById("layout-select").addEventListener("change", onLayoutChange);
}

function buildGraph() {
  if (sigmaInstance) { sigmaInstance.kill(); sigmaInstance = null; }

  const graph = new Graph({ multi: true, type: "directed" });
  graphInstance = graph;

  nodeTypeIndex = {};

  // Add nodes (skip hidden)
  for (const n of allNodes) {
    if (hiddenNodes.has(n.urn)) continue;
    const style = NODE_STYLES[n.node_type] || NODE_STYLES.unknown;
    nodeTypeIndex[n.node_type] = nodeTypeIndex[n.node_type] || [];
    nodeTypeIndex[n.node_type].push(n.urn);

    graph.addNode(n.urn, {
      label: urnLabel(n.urn),
      size: style.size,
      color: style.color,
      x: Math.random() * 100,
      y: Math.random() * 100,
      _type: n.node_type,
      _metadata: n.metadata,
    });
  }

  // Add edges
  let edgeIdx = 0;
  for (const e of allEdges) {
    if (!graph.hasNode(e.from_urn) || !graph.hasNode(e.to_urn)) continue;
    if (hiddenEdgeTypes.has(e.relation_type)) continue;

    const isStructural = e.relation_type === "CONTAINS" &&
      STRUCTURAL_SOURCES.has(graph.getNodeAttribute(e.from_urn, "_type"));
    if (hideStructural && isStructural) continue;

    const style = EDGE_STYLES[e.relation_type] || EDGE_STYLES.CONTAINS;
    graph.addEdgeWithKey(`e-${edgeIdx++}`, e.from_urn, e.to_urn, {
      color: style.color,
      size: style.size,
      type: "arrow",
      _relationType: e.relation_type,
      _metadata: e.metadata,
    });
  }

  // Layout
  applyLayout(graph, currentLayout);

  // Render
  const container = document.getElementById("sigma-container");
  sigmaInstance = new Sigma(graph, container, {
    renderLabels: true,
    labelColor: { color: "#cdd6f4" },
    labelSize: 10,
    labelRenderedSizeThreshold: 6,
    defaultEdgeType: "arrow",
    nodeReducer,
    edgeReducer,
  });

  // Hover events
  sigmaInstance.on("enterNode", ({ node }) => {
    hoveredNode = node;
    hoveredNeighbors = new Set(graph.neighbors(node));
    sigmaInstance.refresh();
  });
  sigmaInstance.on("leaveNode", () => {
    hoveredNode = null;
    hoveredNeighbors = new Set();
    sigmaInstance.refresh();
  });
}

// ── Layout ──
function applyLayout(graph, layout) {
  switch (layout) {
    case "circular":
      circular.assign(graph);
      break;
    case "random":
      random.assign(graph);
      break;
    case "forceatlas2":
    default:
      circular.assign(graph);
      forceAtlas2.assign(graph, {
        iterations: 80,
        settings: {
          barnesHutOptimize: true,
          strongGravityMode: false,
          gravity: 1,
          scalingRatio: 80,
        },
      });
      break;
  }
}

function onLayoutChange(e) {
  currentLayout = e.target.value;
  if (!graphInstance) return;
  applyLayout(graphInstance, currentLayout);
  if (sigmaInstance) sigmaInstance.refresh();
}

// ── Reducers for hover dimming ──
function nodeReducer(node, data) {
  if (!hoveredNode) return data;
  if (node === hoveredNode) return { ...data, highlighted: true, zIndex: 10 };
  if (hoveredNeighbors.has(node)) return { ...data, zIndex: 1 };
  return { ...data, color: "#313244", label: "", zIndex: 0 };
}

function edgeReducer(edge, data) {
  if (!hoveredNode || !graphInstance) return data;
  const src = graphInstance.source(edge);
  const tgt = graphInstance.target(edge);
  if (src === hoveredNode || tgt === hoveredNode) {
    return { ...data, size: data.size * 2, zIndex: 10 };
  }
  return { ...data, hidden: true };
}

// ── Filters UI ──
function buildFilters() {
  const nodeDiv = document.getElementById("node-filters");
  nodeDiv.innerHTML = "";
  for (const type of Object.keys(nodeTypeIndex).sort()) {
    const count = nodeTypeIndex[type].length;
    const style = NODE_STYLES[type] || NODE_STYLES.unknown;
    const row = document.createElement("div");
    row.className = "filter-row";
    row.innerHTML = `
      <input type="checkbox" id="nt-${type}" checked data-node-type="${type}" />
      <span class="swatch" style="background:${style.color}"></span>
      <label for="nt-${type}">${type}</label>
      <span class="count">${count}</span>
    `;
    row.querySelector("input").addEventListener("change", onNodeFilterChange);
    nodeDiv.appendChild(row);
  }

  const edgeDiv = document.getElementById("edge-filters");
  edgeDiv.innerHTML = "";
  for (const type of Object.keys(EDGE_STYLES).sort()) {
    const style = EDGE_STYLES[type];
    const row = document.createElement("div");
    row.className = "filter-row";
    row.innerHTML = `
      <input type="checkbox" id="et-${type}" checked data-edge-type="${type}" />
      <span class="swatch" style="background:${style.color}"></span>
      <label for="et-${type}">${type}</label>
    `;
    row.querySelector("input").addEventListener("change", onEdgeFilterChange);
    edgeDiv.appendChild(row);
  }
}

function onNodeFilterChange(e) {
  const type = e.target.dataset.nodeType;
  const urns = nodeTypeIndex[type] || [];
  if (e.target.checked) {
    for (const u of urns) hiddenNodes.delete(u);
  } else {
    for (const u of urns) hiddenNodes.add(u);
  }
  buildGraph();
}

function onEdgeFilterChange(e) {
  const type = e.target.dataset.edgeType;
  if (e.target.checked) {
    hiddenEdgeTypes.delete(type);
  } else {
    hiddenEdgeTypes.add(type);
  }
  buildGraph();
}

function onStructuralToggle(e) {
  hideStructural = e.target.checked;
  buildGraph();
}

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("collapsed");
  document.getElementById("toggle-btn").classList.toggle("shifted");
}

// ── Tooltip ──
function setupTooltip() {
  const tooltip = document.getElementById("tooltip");
  const container = document.getElementById("sigma-container");

  container.addEventListener("mousemove", (e) => {
    if (!hoveredNode || !graphInstance) { tooltip.style.display = "none"; return; }

    const attrs = graphInstance.getNodeAttributes(hoveredNode);
    const style = NODE_STYLES[attrs._type] || NODE_STYLES.unknown;
    const meta = attrs._metadata || {};

    let html = `<div class="tt-header"><span class="tt-badge" style="background:${style.color}">${attrs._type}</span></div>`;
    html += `<div class="tt-urn">${hoveredNode}</div>`;
    html += "<table>";
    for (const [k, v] of Object.entries(meta)) {
      const val = typeof v === "object" ? JSON.stringify(v) : String(v);
      html += `<tr><td>${k}</td><td>${val}</td></tr>`;
    }
    html += "</table>";
    tooltip.innerHTML = html;
    tooltip.style.display = "block";

    const pad = 16;
    let left = e.clientX + pad;
    let top = e.clientY + pad;
    const rect = tooltip.getBoundingClientRect();
    if (left + rect.width > window.innerWidth) left = e.clientX - rect.width - pad;
    if (top + rect.height > window.innerHeight) top = e.clientY - rect.height - pad;
    tooltip.style.left = left + "px";
    tooltip.style.top = top + "px";
  });

  container.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
}

// ── Stats bar ──
function updateStats() {
  const edgeCounts = {};
  for (const e of allEdges) {
    edgeCounts[e.relation_type] = (edgeCounts[e.relation_type] || 0) + 1;
  }
  const parts = [`Nodes: ${allNodes.length}`, `Edges: ${allEdges.length}`];
  for (const [k, v] of Object.entries(edgeCounts).sort()) {
    parts.push(`${k}: ${v}`);
  }
  document.getElementById("stats").textContent = parts.join("  |  ");
}

main();
</script>
</body>
</html>
