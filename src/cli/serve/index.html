<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Labyrinth &mdash; Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1e1e2e; color: #cdd6f4; height: 100vh; display: flex; flex-direction: column;
  }

  /* ── Header ── */
  #header {
    height: 44px; min-height: 44px;
    background: linear-gradient(135deg, #181825 0%, #1e1e2e 100%);
    border-bottom: 1px solid #313244;
    display: flex; align-items: center; padding: 0 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 50;
  }
  #header .brand {
    font-size: 15px; font-weight: 700; letter-spacing: 1px;
    background: linear-gradient(90deg, #cba6f7, #89b4fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #header .subtitle {
    font-size: 12px; color: #6c7086; margin-left: 12px;
  }

  /* ── Tab bar ── */
  #tab-bar {
    display: flex; gap: 0; background: #181825; border-bottom: 1px solid #313244;
    padding: 0 16px; z-index: 49;
  }
  .tab-btn {
    padding: 10px 20px; font-size: 13px; font-weight: 600;
    color: #6c7086; background: none; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: #bac2de; }
  .tab-btn.active {
    color: #89b4fa; border-bottom-color: #89b4fa;
  }

  /* ── Tab content ── */
  .tab-content { display: none; flex: 1; overflow: hidden; }
  .tab-content.active { display: flex; }

  /* ── Main layout (graph tab) ── */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* ── Sidebar ── */
  #sidebar {
    width: 280px; min-width: 280px; background: #181825; border-right: 1px solid #313244;
    display: flex; flex-direction: column; overflow-y: auto; padding: 12px;
    transition: margin-left 0.2s; z-index: 20;
    box-shadow: 2px 0 12px rgba(0,0,0,0.2);
  }
  #sidebar.collapsed { margin-left: -280px; }
  #sidebar h2 {
    font-size: 11px; font-weight: 600; color: #6c7086; margin: 14px 0 6px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  #sidebar h2:first-child { margin-top: 0; }

  /* Grouped filters */
  #sidebar details { margin-bottom: 2px; }
  #sidebar summary {
    font-size: 12px; font-weight: 600; color: #bac2de; cursor: pointer;
    padding: 4px 0; list-style: none; display: flex; align-items: center; gap: 6px;
  }
  #sidebar summary::before {
    content: "\25B6"; font-size: 8px; color: #6c7086; transition: transform 0.15s;
  }
  #sidebar details[open] > summary::before { transform: rotate(90deg); }

  .filter-row { display: flex; align-items: center; gap: 8px; padding: 3px 0 3px 16px; }
  .filter-row label { font-size: 12px; cursor: pointer; flex: 1; }
  .filter-row .count { font-size: 10px; color: #6c7086; }
  .swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  #sidebar select, #sidebar input[type="search"] {
    width: 100%; padding: 6px 8px; border-radius: 6px; font-size: 12px;
    background: #313244; color: #cdd6f4; border: 1px solid #45475a;
    cursor: pointer; outline: none;
  }
  #sidebar select:hover, #sidebar input[type="search"]:hover { border-color: #6c7086; }
  #sidebar input[type="search"]:focus { border-color: #89b4fa; }
  #sidebar input[type="search"] { cursor: text; }

  /* ── Search results ── */
  #search-results {
    display: none; background: #313244; border: 1px solid #45475a;
    border-radius: 6px; margin-top: 4px; max-height: 200px; overflow-y: auto;
  }
  .search-result-item {
    padding: 6px 10px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #45475a;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: #45475a; }

  /* ── Neighborhood controls ── */
  #focus-section { margin-top: 8px; }
  #focus-label { font-size: 12px; color: #bac2de; margin-bottom: 6px; }
  #focus-controls { display: none; }
  #focus-controls .slider-row {
    display: flex; align-items: center; gap: 8px; margin: 6px 0;
  }
  #focus-controls input[type="range"] { flex: 1; accent-color: #89b4fa; }
  #focus-controls button {
    width: 100%; padding: 5px; border-radius: 6px; font-size: 12px;
    background: #45475a; color: #cdd6f4; border: 1px solid #585b70;
    cursor: pointer;
  }
  #focus-controls button:hover { background: #585b70; }

  /* ── Toggle button ── */
  #toggle-btn {
    position: absolute; top: 8px; left: 8px; z-index: 30;
    background: #313244; border: 1px solid #45475a; color: #cdd6f4;
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
    transition: left 0.2s;
  }
  #toggle-btn.shifted { left: 290px; }

  /* ── Graph container ── */
  #sigma-container { flex: 1; position: relative; }

  /* ── Tooltip ── */
  #tooltip {
    display: none; position: fixed; z-index: 40;
    background: #1e1e2e; border: 1px solid #45475a; border-radius: 8px;
    padding: 0; max-width: 500px; min-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: none;
    font-size: 12px;
  }
  #tooltip .tt-header {
    padding: 8px 12px; border-bottom: 1px solid #313244;
    display: flex; align-items: center; gap: 8px;
  }
  #tooltip .tt-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 600; text-transform: uppercase; color: #1e1e2e;
  }
  #tooltip .tt-pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; color: #1e1e2e;
  }
  #tooltip .tt-urn { font-size: 11px; color: #6c7086; word-break: break-all; padding: 4px 12px 6px; }
  #tooltip table { width: 100%; border-collapse: collapse; }
  #tooltip td { padding: 4px 12px; border-top: 1px solid #313244; font-size: 11px; }
  #tooltip td:first-child { color: #6c7086; white-space: nowrap; width: 1%; }
  #tooltip td:last-child { color: #cdd6f4; word-break: break-word; }

  /* ── Stats bar ── */
  #stats {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: #181825; border-top: 1px solid #313244;
    padding: 5px 16px; font-size: 11px; color: #6c7086;
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  }
  .stat-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #45475a; border-radius: 3px; }

  /* ── Dashboard (Agent Actions tab) ── */
  #dashboard-content {
    display: flex; flex: 1; overflow: hidden;
  }
  #run-sidebar {
    width: 280px; min-width: 280px; background: #181825; border-right: 1px solid #313244;
    overflow-y: auto; padding: 12px;
  }
  #run-sidebar h2 {
    font-size: 11px; font-weight: 600; color: #6c7086; margin: 0 0 10px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .run-item {
    padding: 10px; margin-bottom: 6px; border-radius: 8px; cursor: pointer;
    background: #313244; border: 1px solid transparent; transition: border-color 0.15s;
  }
  .run-item:hover { border-color: #45475a; }
  .run-item.selected { border-color: #89b4fa; }
  .run-item .run-date { font-size: 12px; font-weight: 600; color: #cdd6f4; }
  .run-item .run-meta { font-size: 10px; color: #6c7086; margin-top: 4px; }
  .run-item .run-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

  #dashboard-main {
    flex: 1; overflow-y: auto; padding: 20px;
  }
  .dash-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #6c7086; font-size: 14px;
  }

  /* Summary cards */
  .summary-cards {
    display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .summary-card {
    background: #313244; border-radius: 8px; padding: 16px 20px;
    min-width: 120px; flex: 1;
  }
  .summary-card .card-value {
    font-size: 28px; font-weight: 700;
  }
  .summary-card .card-label {
    font-size: 11px; color: #6c7086; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px;
  }

  /* Action type badges */
  .action-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 600; color: #1e1e2e; white-space: nowrap;
  }
  .action-badge.SOFT_LINK_ADDED { background: #a6e3a1; }
  .action-badge.SOFT_LINK_REMOVED { background: #f38ba8; }
  .action-badge.EVALUATED_AT_MARKED { background: #89b4fa; }
  .action-badge.METADATA_UPDATED { background: #f9e2af; }
  .action-badge.PR_CREATED { background: #cba6f7; }
  .action-badge.BRANCH_CREATED { background: #cba6f7; }
  .action-badge.FILE_CHANGED { background: #f9e2af; }
  .action-badge.MCP_TOOL_CALL { background: #6c7086; color: #cdd6f4; }
  .action-badge.UNKNOWN { background: #45475a; color: #cdd6f4; }

  .heuristic-badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; background: #45475a; color: #cdd6f4;
  }

  .outcome-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 10px; font-weight: 600; color: #1e1e2e;
  }
  .outcome-badge.linked { background: #a6e3a1; }
  .outcome-badge.rejected { background: #f9e2af; }
  .outcome-badge.error { background: #f38ba8; }

  .confidence-pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; color: #1e1e2e;
  }
  .confidence-pill.VERY_HIGH { background: #a6e3a1; }
  .confidence-pill.HIGH { background: #94e2d5; }
  .confidence-pill.MEDIUM { background: #f9e2af; }
  .confidence-pill.LOW { background: #f38ba8; }

  /* Candidate sections */
  .candidate-section {
    background: #181825; border: 1px solid #313244; border-radius: 8px;
    margin-bottom: 12px; overflow: hidden;
  }
  .candidate-header {
    padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #313244;
  }
  .candidate-header:hover { background: #1e1e2e; }
  .candidate-header .caret {
    font-size: 10px; color: #6c7086; transition: transform 0.15s;
  }
  .candidate-section.open .candidate-header .caret { transform: rotate(90deg); }
  .candidate-urn { font-size: 12px; color: #89b4fa; word-break: break-all; flex: 1; }
  .candidate-body { display: none; padding: 16px; }
  .candidate-section.open .candidate-body { display: block; }

  .agent-summary {
    background: #313244; border-radius: 6px; padding: 12px; margin-bottom: 12px;
    font-size: 12px; line-height: 1.5; color: #bac2de;
  }

  /* Actions timeline */
  .actions-timeline { margin-bottom: 12px; }
  .actions-timeline h3 {
    font-size: 11px; font-weight: 600; color: #6c7086; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .action-item {
    display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid #313244;
    font-size: 12px;
  }
  .action-item:last-child { border-bottom: none; }
  .action-time { font-size: 10px; color: #6c7086; min-width: 80px; }
  .action-details { flex: 1; }
  .action-tool { font-size: 11px; color: #6c7086; margin-top: 2px; }
  .action-io {
    margin-top: 6px; background: #313244; border-radius: 4px; padding: 8px;
    font-size: 11px; font-family: monospace; color: #bac2de;
    max-height: 120px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
  }

  /* Links section */
  .links-section h3 {
    font-size: 11px; font-weight: 600; color: #6c7086; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .link-item {
    background: #313244; border-radius: 6px; padding: 10px 12px; margin-bottom: 6px;
    font-size: 12px;
  }
  .link-arrow { color: #6c7086; margin: 0 6px; }
  .link-urn { color: #89b4fa; word-break: break-all; }
  .link-meta { margin-top: 6px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .link-rationale { font-size: 11px; color: #bac2de; margin-top: 6px; }
</style>
</head>
<body>

<div id="header">
  <span class="brand">LABYRINTH</span>
  <span class="subtitle">Dashboard</span>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="graph">Graph</button>
  <button class="tab-btn" data-tab="actions">Agent Actions</button>
</div>

<div id="tab-graph" class="tab-content active">
  <div id="main">
    <button id="toggle-btn" class="shifted">Filters</button>

    <div id="sidebar">
      <h2>Search</h2>
      <input type="search" id="search-input" placeholder="Search by URN..." />
      <div id="search-results"></div>
      <div style="margin-top:6px">
        <select id="tag-filter"></select>
      </div>

      <h2>Neighborhood</h2>
      <div id="focus-section">
        <div id="focus-label">Click a node to focus</div>
        <div id="focus-controls">
          <div class="slider-row">
            <span style="font-size:11px;color:#6c7086">Hops</span>
            <input type="range" id="degree-slider" min="1" max="5" value="1" />
            <span id="degree-value" style="font-size:12px;min-width:14px;text-align:center">1</span>
          </div>
          <button id="clear-focus">Clear Focus</button>
        </div>
      </div>

      <h2>Node Types</h2>
      <div id="node-filters"></div>

      <h2>Edge Types</h2>
      <div id="edge-filters"></div>

      <h2>Layout</h2>
      <div class="filter-row">
        <select id="layout-select">
          <option value="forceatlas2" selected>ForceAtlas2</option>
          <option value="circular">Circular</option>
          <option value="random">Random</option>
        </select>
      </div>

      <h2>Options</h2>
      <div class="filter-row">
        <input type="checkbox" id="hide-structural" checked />
        <label for="hide-structural">Hide structural contains</label>
      </div>
    </div>

    <div id="sigma-container"></div>
  </div>
</div>

<div id="tab-actions" class="tab-content">
  <div id="dashboard-content">
    <div id="run-sidebar">
      <h2>Agent Runs</h2>
      <div id="run-list"></div>
    </div>
    <div id="dashboard-main">
      <div class="dash-empty" id="dashboard-empty">No agent runs found. Run <code>labyrinth agent run</code> to generate data.</div>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<div id="stats"></div>

<script type="module" src="js/graph-app.js"></script>
</body>
</html>
